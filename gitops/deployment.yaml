apiVersion: apps/v1
kind: Deployment
metadata:
  name: forticnapp-demo-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
      containers:
      - name: node-app
        image: 116933114817.dkr.ecr.ca-central-1.amazonaws.com/forticnapp-demo-app:2491e3e533d916778e65bd39047bdd191001571b
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: node-app-service
spec:
  type: LoadBalancer
  selector:
    app: node-app
  ports:
    - port: 80
      targetPort: 3000
